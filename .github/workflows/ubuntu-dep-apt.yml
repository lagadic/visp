name: Ubuntu-dep-apt

# https://www.jeffgeerling.com/blog/2020/running-github-actions-workflow-on-schedule-and-other-events
on:
  pull_request:
    types: [opened, reopened, synchronize]
  schedule:
    - cron: '0 2 * * SUN'

# https://stackoverflow.com/questions/66335225/how-to-cancel-previous-runs-in-the-pr-when-you-push-new-commitsupdate-the-curre#comment133398800_72408109
# https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#concurrency
concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # https://github.com/orgs/community/discussions/28474#discussioncomment-3350256
  check_skip_flags:
    name: Check skip flags
    runs-on: ubuntu-latest
    outputs:
      head-commit-message: ${{ steps.get_head_commit_message.outputs.headCommitMsg }}
    steps:
      - name: Get repo
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Print head git commit message
        id: get_head_commit_message
        run: echo "headCommitMsg=$(git show -s --format=%s)" >> $GITHUB_OUTPUT

  build-ubuntu-dep-apt:
    runs-on: ${{ matrix.os }}
    needs: check_skip_flags
    if: >-
      ${{
        (!contains(needs.check_skip_flags.outputs.head-commit-message, '[SKIP-CI ALL]') &&
        !contains(needs.check_skip_flags.outputs.head-commit-message, '[SKIP-CI UBUNTU-DEP-APT]')) ||
        contains(needs.check_skip_flags.outputs.head-commit-message, '[ENABLE-CI UBUNTU-DEP-APT]')
      }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        compiler: [ {CC: /usr/bin/gcc, CXX: /usr/bin/g++}, {CC: /usr/bin/clang, CXX: /usr/bin/clang++} ]
        standard: [ 98, 11 ]
        ogre: [ogre-1.9, ogre-1.12]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Print system information
      run: lscpu

    - name: Print OS information
      run: lsb_release -a

    - name: Print compiler information
      run: dpkg --list | grep compiler

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libdc1394-dev libv4l-dev liblapack-dev libopenblas-dev libeigen3-dev
        sudo apt-get install -y libopencv-dev nlohmann-json3-dev libcomedi-dev libjpeg-dev libpng-dev libcoin-dev
        sudo apt-get install -y libfreenect-dev libpcl-dev libapriltag-dev

    # - name: Install ur_rtde dependency
    #   run: |
    #     sudo add-apt-repository -y ppa:sdurobotics/ur-rtde
    #     sudo apt-get update
    #     sudo apt install -y librtde librtde-dev libboost-system-dev libboost-thread-dev libboost-program-options-dev

    - name: Install Ogre 1.9
      if: matrix.ogre == 'ogre-1.9' && matrix.standard != '17'
      run: sudo apt-get install -y libogre-1.9-dev

    - name: Install Ogre 1.12
      if: matrix.ogre == 'ogre-1.12'
      run: sudo apt-get install -y libogre-1.12-dev

    - name: Clone visp-images
      env:
        BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
      # https://remarkablemark.org/blog/2022/09/25/check-git-branch-exists-in-remote-repository/
      run: |
        git clone --depth 1 https://github.com/lagadic/visp-images ${HOME}/visp-images
        echo "VISP_INPUT_IMAGE_PATH=$HOME/visp-images" >> $GITHUB_ENV
        echo ${VISP_INPUT_IMAGE_PATH}

    - name: Clone visp_sample
      run: |
        git clone --depth 1 https://github.com/lagadic/visp_sample ${HOME}/visp_sample

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        CC=${{ matrix.compiler.CC }}
        CXX=${{ matrix.compiler.CXX }}
        CXX_STANDARD=${{ matrix.standard }}
        echo "CC: $CC"
        echo "CXX: $CXX"
        echo "Standard: $CXX_STANDARD"

        cmake .. -DCMAKE_C_COMPILER="${CC}" -DCMAKE_CXX_COMPILER="${CXX}" -DUSE_CXX_STANDARD=$CXX_STANDARD \
                 -DCMAKE_VERBOSE_MAKEFILE=ON -DCMAKE_BUILD_TYPE=Release \
                 -DBUILD_APPS=ON -DBUILD_DEMOS=OFF -DBUILD_EXAMPLES=OFF -DBUILD_TESTS=OFF -DBUILD_TUTORIALS=OFF -DBUILD_JAVA=OFF \
                 -DBUILD_MODULE_visp_java=OFF -DBUILD_MODULE_visp_java_binding=OFF

        cat ViSP-third-party.txt
        sudo make -j$(nproc) install
        ./apps/calibration/intrinsic/visp-calibrate-camera
