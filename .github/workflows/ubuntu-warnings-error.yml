# Isolated = build without 3rdparty and visp-images
name: Ubuntu-warnings-error

# https://www.jeffgeerling.com/blog/2020/running-github-actions-workflow-on-schedule-and-other-events
on:
  pull_request:
    types: [opened, reopened, synchronize]
  schedule:
    - cron: '0 2 * * SUN'

# https://stackoverflow.com/questions/66335225/how-to-cancel-previous-runs-in-the-pr-when-you-push-new-commitsupdate-the-curre#comment133398800_72408109
# https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#concurrency
concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-ubuntu-dep-apt-isolated:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        compiler: [ {CC: /usr/bin/gcc, CXX: /usr/bin/g++} ]
        standard: [ 17 ]

    steps:
      # Install OpenCV
    - name: Install OpenCV
      run: |
        sudo apt-get update
        sudo apt-get install libopencv-dev

    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Print system information
      run: lscpu

    - name: Print OS information
      run: lsb_release -a

    - name: Print compiler information
      run: dpkg --list | grep compiler

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        CC=${{ matrix.compiler.CC }}
        CXX=${{ matrix.compiler.CXX }}
        CXX_STANDARD=${{ matrix.standard }}
        echo "CC: $CC"
        echo "CXX: $CXX"
        echo "Standard: $CXX_STANDARD"
        cmake .. -DCMAKE_C_COMPILER="${CC}" \
                 -DCMAKE_CXX_COMPILER="${CXX}" \
                 -DUSE_CXX_STANDARD=$CXX_STANDARD \
                 -DBUILD_JAVA=OFF \
                 -DBUILD_MODULE_visp_java=OFF \
                 -DBUILD_MODULE_visp_java_binding=OFF \
                 -DACTIVATE_WARNING_ALL=ON \
                 -DACTIVATE_WARNING_EXTRA=ON \
                 -DACTIVATE_WARNING_SHADOW=ON \
                 -DACTIVATE_WARNING_FLOAT_EQUAL=ON \
                 -DCMAKE_CXX_FLAGS=-Werror
        cat ViSP-third-party.txt

    - name: Compile
      working-directory: build
      run: |
        make -j$(nproc)
